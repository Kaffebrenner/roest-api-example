      description: |-
        * `0` - Air Temperature Profile
        * `1` - Bean Temperature Profile
        * `2` - Power Profile
        * `3` - Hybrid Air Temperature
        * `4` - Hybrid Bean Temperature
        * `5` - Inlet Temperature Profile
        * `6` - Power by Bean Temperature
        * `7` - Inlet Temperature by Bean Temperature
