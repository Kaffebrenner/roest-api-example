      description: |-
        * `0` - Event
        * `1` - Data
    Datapoint:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        data_type:
          allOf:
          - $ref: '#/components/schemas/DataTypeEnum'
          minimum: 0
          maximum: 65535
        event_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          - $ref: '#/components/schemas/NullEnum'
        fan:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        heat:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        bt:
          type: number
          format: double
          nullable: true
        et:
          type: number
          format: double
          nullable: true
        target:
          type: number
          format: double
          nullable: true
        rpm:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        crack:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        drum_temp:
          type: number
          format: double
          nullable: true
          description: Drum temperature in degrees Celsius
        inlet_temp:
