components:
  schemas:
    BBPProfile:
      type: object
      description: |-
        " @brief        Serializer for the bbp_profile endpoint.
        "
        " @detail       The only field on this serializer is the
        "               bbp_profile on the machine model.
        "
        "               We also do extra validation on this field
        "               to check that the profile that is assigned
        "               is owned by the user.
      properties:
        bbp_profile:
          type: string
          format: uri
          nullable: true
    BBPProfileMetadata:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        id:
          type: integer
          readOnly: true
        share_uuid:
          type: string
          format: uuid
          nullable: true
          description: Automatically set on shared profiles
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        parent:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 255
        profile_type:
          allOf:
          - $ref: '#/components/schemas/ProfileTypeEnum'
          minimum: 0
          maximum: 65535
        preheat_temperature:
          type: number
          format: double
        batch_weight:
          type: number
          format: double
        end_condition:
          allOf:
          - $ref: '#/components/schemas/EndConditionEnum'
          minimum: 0
          maximum: 65535
        end_condition_value:
          type: number
          format: double
          description: Time in milliseconds, Percentage from 0 -> 100 or Temperature
            in Celsius
        is_bbp_profile:
          type: boolean
          title: Between batch protocol
          description: Between batch protocol profile
        reversed_drum_direction:
          type: boolean
          description: Profile roasts with reversed drum direction
        public_share_uuid:
          type: string
          format: uuid
          nullable: true
          description: Automatically set when a profile is shared in public profile
            library
        public_share_disabled:
          type: boolean
          description: Set to True to hide profile from public profile library
        is_leaf:
          type: boolean
          description: True if this item is the latest version of the profile
        notes:
          type: string
          nullable: true
          maxLength: 2047
        is_verified:
          type: boolean
          description: Set to true to add a validation star in the public profile
            library
        machinetype:
          nullable: true
          minimum: 0
          maximum: 65535
          oneOf:
          - $ref: '#/components/schemas/MachinetypeEnum'
          - $ref: '#/components/schemas/NullEnum'
        customer:
          type: string
          format: uri
        metadata_image:
          type: string
          format: uri
          nullable: true
      required:
      - created
      - customer
      - id
      - modified
      - name
      - parent
      - profile_type
      - share_uuid
      - url
    BeanProcessEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      type: integer
      description: |-
        * `1` - Natural
        * `2` - Washed
        * `3` - Honey / pulped natural
        * `4` - Other
        * `5` - Anaerobic / extended fermentation
        * `6` - Decaf
    BeanSizeEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      type: integer
      description: |-
        * `1` - Very large
        * `2` - Large
        * `3` - Medium
        * `4` - Small
        * `5` - Shells
    BetaFeature:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
      required:
      - id
      - name
    ColorThemeEnum:
      enum:
      - 0
      - 1
      - 2
      type: integer
      description: |-
        * `0` - Light mode
        * `1` - Dark mode
        * `2` - Browser default
    ColumnSetting:
      type: object
      properties:
        column_id:
          type: string
          maxLength: 30
        visible:
          type: boolean
          nullable: true
      required:
      - column_id
    Comment:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        comment:
          type: string
        cupping_score:
          type: string
          nullable: true
          maxLength: 20
        log:
          type: string
          format: uri
        author:
          type: string
          format: uri
          nullable: true
      required:
      - comment
      - created
      - log
      - modified
      - url
    CuppingDescriptor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 255
      required:
      - id
    CuppingFieldValue:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        label:
          type: string
          nullable: true
          maxLength: 255
        value:
          type: number
          format: double
        parent_field_type:
          type: integer
      required:
      - id
      - parent_field_type
    CuppingForm:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 255
        status:
          nullable: true
          description: |-
            Customers can only select Public forms when creating a new cupping session. Admins can also select Interal forms when creating a new cupping session.

            * `0` - Disabled
            * `1` - Internal
            * `2` - Public
            * `None` - Unknown
          oneOf:
          - $ref: '#/components/schemas/CuppingFormStatusEnum'
          - $ref: '#/components/schemas/NullEnum'
        enable_descriptors:
          type: boolean
        enable_notes:
          type: boolean
        score_calculation:
          nullable: true
          description: |-
            Score is calculated from fields where included_in_score is set

            * `0` - None
            * `1` - Aggregated
            * `2` - Average
            * `None` - Unknown
          oneOf:
          - $ref: '#/components/schemas/ScoreCalculationEnum'
          - $ref: '#/components/schemas/NullEnum'
        score_constant:
          type: number
          format: double
          nullable: true
          description: Value to add to or subtract from final score
        form_fields:
          type: array
          items:
            $ref: '#/components/schemas/CuppingFormField'
          readOnly: true
      required:
      - form_fields
      - id
      - url
    CuppingFormField:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        field_label:
          type: string
          nullable: true
          maxLength: 255
        field_type_name:
          type: string
          readOnly: true
        field_type:
          type: integer
          readOnly: true
        field_values:
          type: array
          items:
            $ref: '#/components/schemas/CuppingFieldValue'
        default_value:
          type: number
          format: double
          readOnly: true
        included_in_score:
          type: boolean
        order:
          type: integer
          maximum: 65535
          minimum: 0
          nullable: true
          description: Fields are displayed in order, lowest order number first
      required:
      - default_value
      - field_type
      - field_type_name
      - field_values
      - id
    CuppingFormStatusEnum:
      enum:
      - 0
      - 1
      - 2
      description: |-
        * `0` - Disabled
        * `1` - Internal
        * `2` - Public
        * `None` - Unknown
    CuppingLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 200
        batch_no:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        machine_slug:
          type: string
          readOnly: true
        profile_id:
          type: integer
          nullable: true
          readOnly: true
        profile_name:
          type: string
          nullable: true
          maxLength: 255
        profile_data:
          allOf:
          - $ref: '#/components/schemas/EmbeddedProfile'
          readOnly: true
        inventory_id:
          type: integer
          nullable: true
          readOnly: true
        inventory_name:
          type: string
          readOnly: true
        bean_name:
          type: string
          nullable: true
          maxLength: 255
      required:
      - id
      - inventory_id
      - inventory_name
      - machine_slug
      - profile_data
      - profile_id
    CuppingSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
          maxLength: 255
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        cupping_form:
          type: string
          format: uri
        cupping_form_data:
          allOf:
          - $ref: '#/components/schemas/CuppingForm'
          readOnly: true
        customer:
          type: string
          format: uri
        is_blind:
          type: boolean
        status:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CuppingSessionStatusEnum'
          - $ref: '#/components/schemas/NullEnum'
        cupping_samples:
          type: array
          items:
            $ref: '#/components/schemas/CuppingSessionSample'
        session_scores:
          type: array
          items:
            $ref: '#/components/schemas/CuppingSessionResult'
          readOnly: true
      required:
      - created
      - cupping_form
      - cupping_form_data
      - cupping_samples
      - customer
      - id
      - modified
      - name
      - session_scores
      - url
    CuppingSessionResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        evaluator_name:
          type: string
          nullable: true
          maxLength: 255
        user:
          type: string
          format: uri
          nullable: true
        cupping_session:
          type: string
          format: uri
        sample_scores:
          type: array
          items:
            $ref: '#/components/schemas/CuppingSessionSampleResult'
      required:
      - cupping_session
      - id
      - sample_scores
    CuppingSessionSample:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        log:
          type: string
          format: uri
          nullable: true
        log_data:
          allOf:
          - $ref: '#/components/schemas/CuppingLog'
          readOnly: true
        external_log_name:
          type: string
          nullable: true
          maxLength: 255
      required:
      - id
      - log_data
    CuppingSessionSampleResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        descriptors:
          type: array
          items:
            $ref: '#/components/schemas/CuppingDescriptor'
        cupping_session_sample:
          type: integer
        scores:
          type: array
          items:
            $ref: '#/components/schemas/CuppingSessionSampleResultScore'
        notes:
          type: string
          nullable: true
          maxLength: 2047
        total_score:
          type: number
          format: double
          nullable: true
      required:
      - cupping_session_sample
      - descriptors
      - id
      - scores
    CuppingSessionSampleResultScore:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cupping_form_field:
          type: integer
        score:
          type: number
          format: double
      required:
      - cupping_form_field
      - id
    CuppingSessionStatusEnum:
      enum:
      - 1
      - 2
      - 3
      description: |-
        * `1` - In progress
        * `2` - Closed
        * `3` - Deleted
        * `None` - Unknown
    Customer:
