openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /applications/:
    get:
      operationId: applications_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - applications
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOAuthApplicationList'
          description: ''
    post:
      operationId: applications_create
      description: |-
        Create a new access token for the current logged in user.

        You can use this client to request access tokens like this:

            curl -X POST                 -F 'client_id=<client_id>'                 -F 'client_secret=<client_secret>'                 -F 'grant_type=client_credentials'                 http://localhost:8000/o/token/
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthApplication'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthApplication'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OAuthApplication'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthApplication'
          description: ''
